# Hand-curated overrides for wordy_phrases.toml generator.
# Keyed by id = nfc(lowercase(phrase)).
# Applied AFTER dedup + severity tagging, BEFORE TOML emit (per D-09).
# Ops: drop | severity | replacement | dialects | note.

[overrides]

# Rule 2 judgment entries — all are legitimate verbose-filler phrases; keep + restore severity.
# "because of the fact that → because": classic filler; single source → medium.
[overrides."because of the fact that"]
severity = "medium"
note = "Common verbose filler; replacement is concise and unambiguous."

# "due to the fact that → because": present in both sources → high.
[overrides."due to the fact that"]
severity = "high"
note = "Common verbose filler; both sources confirm this is a strong signal."

# "in light of the fact that → because": single source, common filler → medium.
[overrides."in light of the fact that"]
severity = "medium"
note = "Common verbose filler; replacement is concise and unambiguous."

# "in view of the above → so": present in both sources → high.
[overrides."in view of the above"]
severity = "high"
note = "Both sources flag this phrase; 'so' is the intended concise replacement."

# "owing to the fact that → because": single source, common filler → medium.
[overrides."owing to the fact that"]
severity = "medium"
note = "Common verbose filler; replacement is concise and unambiguous."

# --- CLAR-04 inflection contract (gap closure, pipeline path 1) ---
# retext-simplify@c7686ac ships "utilize" + "utilization" only; inflected forms "utilizes"/"utilized"
# absent from upstream. Added here as own PhraseEntry rows per D-05 (each inflected form as own entry).
# sources=["manual"] per D-14 truthfulness — do not claim retext/plainlang provenance.
# severity="medium" per D-07 single-source default (manual entries are single-source by definition).

[overrides."utilizes"]
add = true
phrase = "utilizes"
replacement = "use"
severity = "medium"
sources = ["manual"]
note = "Inflected form of 'utilize'; added to satisfy CLAR-04 dataset-driven inflection contract."

[overrides."utilized"]
add = true
phrase = "utilized"
replacement = "used"
severity = "medium"
sources = ["manual"]
note = "Inflected form of 'utilize'; added to satisfy CLAR-04 dataset-driven inflection contract."
